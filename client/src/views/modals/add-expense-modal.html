<div class="modal-overlay" id="addExpenseModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Add expense</h2>
      <button type="button" class="modal-close" data-close-modal="addExpenseModalOverlay">&times;</button>
    </div>
    <div class="modal-body">
      <form id="addExpenseForm">
        <div class="form-field">
          <label for="expenseDescription">What was it for?</label>
          <input type="text" id="expenseDescription" placeholder="Dinner at the beach shack" />
        </div>

        <div class="form-field" style="display:flex; gap: var(--space-3);">
          <div style="flex:1;">
            <label for="expenseAmount">Amount</label>
            <input type="number" id="expenseAmount" min="0.01" step="0.01" placeholder="0.00" />
          </div>
          <div style="width:110px;">
            <label for="expenseCurrency">Currency</label>
            <select id="expenseCurrency">
              <option value="INR">INR</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
            </select>
          </div>
        </div>

        <div class="form-field">
          <label for="expensePaidBy">Paid by</label>
          <select id="expensePaidBy"></select>
        </div>

        <div class="form-field">
          <label>Split between</label>
          <div class="participant-picker" id="expenseParticipantPicker"></div>
        </div>

        <div class="form-field">
          <label for="expenseReceiptInput">Receipt <span class="form-hint" style="display:inline">(optional)</span></label>
          <input type="file" id="expenseReceiptInput" accept="image/jpeg,image/png,image/webp" />
        </div>

        <div id="addExpenseBanner" class="form-banner"></div>
        <button type="submit" class="btn btn-primary btn-block" id="addExpenseSubmit">Add expense</button>
      </form>
    </div>
  </div>
</div>
