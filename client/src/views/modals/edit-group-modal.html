<div class="modal-overlay" id="editGroupModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Edit group</h2>
      <button type="button" class="modal-close" data-close-modal="editGroupModalOverlay">&times;</button>
    </div>
    <div class="modal-body">
      <form id="editGroupForm">
        <div class="form-field">
          <label for="editGroupName">Group name</label>
          <input type="text" id="editGroupName" />
        </div>
        <div class="form-field">
          <label for="editGroupDescription">Description</label>
          <input type="text" id="editGroupDescription" />
        </div>
        <div class="form-field">
          <label>Members</label>
          <div id="editGroupMembersList"></div>
        </div>
        <div id="editGroupBanner" class="form-banner"></div>
        <button type="submit" class="btn btn-primary btn-block" id="editGroupSubmit">Save changes</button>
      </form>
    </div>
  </div>
</div>
