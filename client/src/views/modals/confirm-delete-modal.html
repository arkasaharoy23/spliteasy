<div class="modal-overlay" id="confirmDeleteModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="confirmDeleteTitle">Delete group?</h2>
      <button type="button" class="modal-close" data-close-modal="confirmDeleteModalOverlay">&times;</button>
    </div>
    <div class="modal-body">
      <p class="modal-subtext" id="confirmDeleteMessage">This will permanently delete the group and all its expenses. This can't be undone.</p>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-close-modal="confirmDeleteModalOverlay">Cancel</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteConfirmBtn">Delete</button>
    </div>
  </div>
</div>
