<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — SplitEasy</title>
  <link rel="icon" href="../../public/assets/images/favicon.ico" sizes="any" />
  <link rel="icon" href="../../public/assets/images/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components/buttons.css" />
  <link rel="stylesheet" href="../css/components/cards.css" />
  <link rel="stylesheet" href="../css/pages/dashboard.css" />
  <link rel="stylesheet" href="../css/pages/settings.css" />
</head>
<body class="dashboard-body">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <a href="index.html" class="brand sidebar-brand">
        <img src="../../public/assets/images/logo.svg" alt="SplitEasy logo" class="brand-logo" />
        <span class="brand-name">SplitEasy</span>
      </a>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
          <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5" /><rect x="14" y="3" width="7" height="5" rx="1.5" /><rect x="14" y="12" width="7" height="9" rx="1.5" /><rect x="3" y="16" width="7" height="5" rx="1.5" /></svg>
          <span>Dashboard</span>
        </a>
        <a href="groups.html" class="sidebar-link">
          <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2" /><circle cx="10" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>
          <span>Groups</span>
        </a>
        <a href="analytics.html" class="sidebar-link">
          <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18" /><path d="M18 17V9M13 17V5M8 17v-4" /></svg>
          <span>Analytics</span>
        </a>
        <a href="notifications.html" class="sidebar-link">
          <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></svg>
          <span>Notifications</span>
        </a>
        <a href="settings.html" class="sidebar-link is-active">
          <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>
          <span>Settings</span>
        </a>
      </nav>

      <button type="button" class="btn btn-secondary btn-block sidebar-logout" id="logoutBtn">Sign out</button>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>

        <div class="topbar-greeting">
          <p class="topbar-eyebrow">Your profile</p>
          <h1>Settings</h1>
        </div>
      </header>

      <main class="dashboard-content">
        <section class="dashboard-panel settings-panel">
          <div class="photo-upload-row">
            <div class="photo-preview" id="settingsPhotoPreview">?</div>
            <div class="photo-upload-actions">
              <label for="settingsPhotoInput" class="btn btn-secondary btn-sm">Change photo</label>
              <input type="file" id="settingsPhotoInput" accept="image/jpeg,image/png,image/webp" />
              <span class="form-hint">JPG, PNG or WEBP, under 5MB</span>
              <span class="form-error" id="settingsPhotoError"></span>
            </div>
          </div>

          <form id="settingsForm">
            <div class="form-field" id="settingsFullNameField">
              <label for="settingsFullName">Full name</label>
              <input type="text" id="settingsFullName" />
              <span class="form-error"></span>
            </div>

            <div class="form-field" id="settingsUsernameField">
              <label for="settingsUsername">Username</label>
              <input type="text" id="settingsUsername" />
              <span class="form-error"></span>
            </div>

            <div class="form-field">
              <label for="settingsEmail">Email</label>
              <input type="email" id="settingsEmail" disabled />
              <span class="form-hint">Email is tied to your sign-in account and can't be changed here.</span>
            </div>

            <div class="form-field" id="settingsUpiField">
              <label for="settingsUpi">UPI ID</label>
              <input type="text" id="settingsUpi" placeholder="yourname@okaxis" />
              <span class="form-error"></span>
            </div>

            <div id="settingsBanner" class="form-banner"></div>
            <button type="submit" class="btn btn-primary" id="settingsSubmit">Save changes</button>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="../js/pages/settings.js"></script>
</body>
</html>
